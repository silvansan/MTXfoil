# Production overrides — pin images and tighten defaults
services:
  mediamtx:
    build: ./mediamtx
    image: mtxfoil-mediamtx:${MTXFOIL_VERSION:-latest}
    pull_policy: build
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:9997/v3/paths/list || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    restart: always
    image: mtxfoil-dashboard:${MTXFOIL_VERSION:-latest}
    pull_policy: build
    environment:
      NODE_ENV: production
      PAYLOAD_DB_PUSH: 'false'
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DASHBOARD_PUBLIC_URL: ${DASHBOARD_PUBLIC_URL:-}
      MEDIAMTX_INTERNAL_USER: ${MEDIAMTX_INTERNAL_USER}
      MEDIAMTX_INTERNAL_PASS: ${MEDIAMTX_INTERNAL_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/health/mediamtx'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  worker:
    restart: always
    image: mtxfoil-worker:${MTXFOIL_VERSION:-latest}
    pull_policy: build
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:'+(process.env.WORKER_HEALTH_PORT||9999)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mediamtx:
        condition: service_started
