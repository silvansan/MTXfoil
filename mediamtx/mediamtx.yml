###############################################
# MTXfoil baseline MediaMTX config
# Dashboard regenerates paths section on stream save
###############################################

logLevel: info
logDestinations: [stdout]

# Control API — internal Docker network only (not published to host)
api: yes
apiAddress: :9997
apiEncryption: no
apiAllowOrigins: ['http://localhost:3000']

# Metrics — internal only
metrics: yes
metricsAddress: :9998
metricsAllowOrigins: ['http://localhost:3000']

# Security defaults
authMethod: internal
authInternalUsers:
  - user: mtxfoil
    pass: mtxfoil
    ips: []
    permissions:
      - action: publish
        path: ''
      - action: read
        path: ''
      - action: playback
        path: ''
      - action: api
        path: ''
      - action: metrics
        path: ''
      - action: pprof
        path: ''

# Disable anonymous publish globally
pathDefaults:
  source: publisher
  overridePublisher: yes
  record: no

# Protocol listeners
rtmp: yes
rtmpAddress: :1935
rtmps: yes
rtmpsAddress: :1936
rtsp: yes
rtspAddress: :8554
srt: yes
srtAddress: :8890
hls: yes
hlsAddress: :8888
hlsAllowOrigins: ['*']
webrtc: yes
webrtcAddress: :8889
webrtcICEServers2: []
webrtcAllowOrigins: ['*']

playback: yes
playbackAddress: :9996
playbackAllowOrigins: ['*']

pprof: no

# Paths managed by MTXfoil dashboard
paths: {}
