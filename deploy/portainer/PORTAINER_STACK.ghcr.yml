# Portainer stack — pre-built images only (no build contexts).
# Requires ghcr.io/silvansan/mtxfoil-dashboard and mtxfoil-worker (see publish-images.yml).
# Use after GitHub Actions has published images and packages are public (or GHCR registry added in Portainer).

services:
  mediamtx-config-init:
    image: alpine:3.20
    container_name: mtxfoil-mediamtx-config-init
    restart: "no"
    environment:
      MTXFOIL_CONFIG_REF: ${MTXFOIL_CONFIG_REF:-main}
      MTXFOIL_REPO: ${MTXFOIL_REPO:-silvansan/MTXfoil}
    volumes:
      - mtxfoil-mediamtx-config:/mediamtx-config
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -f /mediamtx-config/mediamtx.yml ]; then
          echo "[mediamtx-init] Config already present, skipping seed"
          exit 0
        fi
        echo "[mediamtx-init] Seeding mediamtx.yml from GitHub ($${MTXFOIL_REPO}@$${MTXFOIL_CONFIG_REF})"
        mkdir -p /mediamtx-config
        wget -q -O /mediamtx-config/mediamtx.yml \
          "https://raw.githubusercontent.com/$${MTXFOIL_REPO}/$${MTXFOIL_CONFIG_REF}/mediamtx/mediamtx.yml"
    networks:
      - mtxfoil

  mediamtx:
    image: bluenviron/mediamtx:${MEDIAMTX_IMAGE_TAG:-latest}
    container_name: mtxfoil-mediamtx
    restart: unless-stopped
    # Official image is scratch-based (no shell, wget, or curl). Dashboard healthcheck
    # probes MediaMTX via /api/health/mediamtx; worker uses service_started.
    volumes:
      - mtxfoil-mediamtx-config:/mediamtx-config
      - mtxfoil-recordings:/recordings
    ports:
      - "${RTMP_PORT:-1935}:1935/tcp"
      - "${RTMPS_PORT:-1936}:1936/tcp"
      - "${RTSP_PORT:-8554}:8554/tcp"
      - "${HLS_PORT:-8888}:8888/tcp"
      - "${WEBRTC_HTTP_PORT:-8889}:8889/tcp"
      - "${WEBRTC_ICE_PORT:-8189}:8189/udp"
      - "${SRT_PORT:-8890}:8890/udp"
    command: ["/mediamtx", "/mediamtx-config/mediamtx.yml"]
    depends_on:
      mediamtx-config-init:
        condition: service_completed_successfully
    networks:
      - mtxfoil

  postgres:
    image: postgres:16-alpine
    container_name: mtxfoil-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mtxfoil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mtxfoil}
    volumes:
      - mtxfoil-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mtxfoil}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mtxfoil

  redis:
    image: redis:7-alpine
    container_name: mtxfoil-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - mtxfoil

  dashboard:
    image: ${MTXFOIL_IMAGE_REGISTRY:-ghcr.io/silvansan}/mtxfoil-dashboard:${MTXFOIL_VERSION:-latest}
    container_name: mtxfoil-dashboard
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mtxfoil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mtxfoil}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_METRICS_URL: http://mediamtx:9998
      MEDIAMTX_CONFIG_PATH: /app/mediamtx-config/mediamtx.yml
      MEDIAMTX_BACKUP_DIR: /app/mediamtx-config/backups
      MEDIAMTX_INTERNAL_USER: ${MEDIAMTX_INTERNAL_USER}
      MEDIAMTX_INTERNAL_PASS: ${MEDIAMTX_INTERNAL_PASS}
      PUBLIC_STREAM_DOMAIN: ${PUBLIC_STREAM_DOMAIN}
      DASHBOARD_PUBLIC_URL: ${DASHBOARD_PUBLIC_URL}
      HLS_BASE_URL: ${HLS_BASE_URL}
      WEBRTC_BASE_URL: ${WEBRTC_BASE_URL}
      PLAYBACK_TOKEN_SECRET: ${PLAYBACK_TOKEN_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      PAYLOAD_DB_PUSH: "false"
    volumes:
      - mtxfoil-mediamtx-config:/app/mediamtx-config
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mediamtx:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/health/mediamtx'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - mtxfoil

  worker:
    image: ${MTXFOIL_IMAGE_REGISTRY:-ghcr.io/silvansan}/mtxfoil-worker:${MTXFOIL_VERSION:-latest}
    container_name: mtxfoil-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mtxfoil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mtxfoil}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_HOST: mediamtx
      MEDIAMTX_INTERNAL_USER: ${MEDIAMTX_INTERNAL_USER}
      MEDIAMTX_INTERNAL_PASS: ${MEDIAMTX_INTERNAL_PASS}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT:-9999}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mediamtx:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:'+(process.env.WORKER_HEALTH_PORT||9999)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mtxfoil

networks:
  mtxfoil:
    name: mtxfoil

volumes:
  mtxfoil-postgres-data:
  mtxfoil-mediamtx-config:
  mtxfoil-recordings:
