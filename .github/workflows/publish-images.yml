name: Publish images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard
            context: ./dashboard
            dockerfile: ./dashboard/Dockerfile
            payload_db_push: "false"
          - name: worker
            context: ./worker
            dockerfile: ./worker/Dockerfile
            payload_db_push: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/mtxfoil-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.payload_db_push != '' && format('PAYLOAD_DB_PUSH={0}', matrix.payload_db_push) || '' }}

      - name: Set GHCR package visibility to public
        run: |
          gh api --method PATCH \
            "/users/${GITHUB_REPOSITORY_OWNER,,}/packages/container/mtxfoil-${{ matrix.name }}/visibility" \
            -f visibility=public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
